# Kubernetes Secrets Templates for BrainCell
# These files contain templates for creating Kubernetes secrets
# DO NOT commit actual secrets to git - use these as templates only

apiVersion: v1
kind: Secret
metadata:
  name: braincell-postgres-secret
  namespace: braincell
type: Opaque
stringData:
  # Replace with actual strong password
  password: "CHANGE_ME_STRONG_PASSWORD"
  username: "braincell"
  database: "braincell"
  # Connection string
  connectionString: "postgresql://braincell:CHANGE_ME_STRONG_PASSWORD@braincell-postgres:5432/braincell"
