apiVersion: v1
kind: Secret
metadata:
  name: braincell-api-secret
  namespace: braincell
type: Opaque
stringData:
  # API JWT secret key
  jwt-secret: "CHANGE_ME_JWT_SECRET_KEY_MIN_32_CHARS"
  # API keys for external services
  openai-api-key: "CHANGE_ME_OPENAI_API_KEY"
  # Redis password (if needed)
  redis-password: "CHANGE_ME_REDIS_PASSWORD"
