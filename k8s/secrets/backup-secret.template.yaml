apiVersion: v1
kind: Secret
metadata:
  name: s3-backup-credentials
  namespace: braincell
type: Opaque
stringData:
  # S3/Azure Blob/GCS credentials for backups
  aws-access-key-id: "CHANGE_ME_AWS_ACCESS_KEY"
  aws-secret-access-key: "CHANGE_ME_AWS_SECRET_KEY"
  # Or Azure storage
  azure-storage-account: "CHANGE_ME_AZURE_ACCOUNT"
  azure-storage-key: "CHANGE_ME_AZURE_KEY"
