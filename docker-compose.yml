version: '3.8'

services:
  # PostgreSQL for structured memory storage
  postgres:
    image: postgres:15-alpine
    container_name: braincell-postgres
    environment:
      POSTGRES_DB: braincell
      POSTGRES_USER: braincell
      POSTGRES_PASSWORD: braincell_dev_password
    ports:
      - "9500:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U braincell"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - braincell-network

  # Weaviate vector database for semantic search
  weaviate:
    image: semitechnologies/weaviate:1.27.0
    container_name: braincell-weaviate
    ports:
      - "9501:8080"
      - "9502:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      ENABLE_API_AUTH: 'false'
      RAFT_BOOTSTRAP_EXPECTED_NODES: '1'
      RAFT_BOOTSTRAP_TIMEOUT: '300'
    volumes:
      - weaviate_data:/var/lib/weaviate
    networks:
      - braincell-network

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: braincell-redis
    ports:
      - "9503:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - braincell-network

  # PgAdmin for PostgreSQL management (optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: braincell-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "9505:80"
    depends_on:
      - postgres
    networks:
      - braincell-network

volumes:
  postgres_data:
  weaviate_data:
  redis_data:

networks:
  braincell-network:
    driver: bridge
