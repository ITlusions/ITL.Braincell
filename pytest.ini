[pytest]
# pytest configuration for BrainCell test suite

# Markers for test categorization
markers =
    functional: Functional test cases
    edge: Edge case test cases
    state: Memory state test cases
    performance: Performance and load tests
    integration: Integration test cases
    slow: Tests that take > 1 second
    critical: Critical path tests (should always pass)

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Async test configuration
asyncio_mode = auto

# Timeout for tests (seconds)
timeout = 30

# Minimum Python version
minversion = 3.9

# Test paths
testpaths = tests

# Coverage options (if pytest-cov installed)
# --cov=src
# --cov-report=html
# --cov-report=term-missing

# Logging
log_cli = false
log_cli_level = INFO
