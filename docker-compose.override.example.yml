version: '3.8'

# Development overrides for docker-compose.yml
# Use with: docker-compose -f docker-compose.yml up

services:
  braincell-api:
    environment:
      DEBUG: "true"
      LOG_LEVEL: "DEBUG"
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src

  postgres:
    environment:
      POSTGRES_INITDB_ARGS: "-c log_statement=all"
    ports:
      - "5432:5432"

  weaviate:
    environment:
      LOG_LEVEL: info
