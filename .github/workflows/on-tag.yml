name: Release pipeline — Tag push

# ---------------------------------------------------------------------------
# Triggers on semver tag push: v1.2.3 or v1.2.3-rc.1 etc.
# GitFlow: tags are set on main (stable) or release/* (rc/pre-release).
#
# 1. publish: downloads the existing CI wheel artifact and publishes to PyPI.
# 2. release: creates a GitHub Release with the wheel as a downloadable asset.
# ---------------------------------------------------------------------------
on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"            # v1.2.3 and v1.2.3-rc.1 / -beta.1 / -alpha.1

jobs:
  publish:
    name: Publish to PyPI
    uses: ITlusions/ITL.Github/.github/workflows/_reusable-publish-pypi.yml@main
    with:
      artifact-name: "braincell-wheel"
      commit-sha: ${{ github.sha }}
      ci-workflow-name: "CI — Branch push"
      environment: "production"

  release:
    name: GitHub Release
    needs: publish
    uses: ITlusions/ITL.Github/.github/workflows/_reusable-release-gh.yml@main
    with:
      tag: ${{ github.ref_name }}
      artifact-name: "braincell-wheel"
      artifact-run-id: ${{ needs.publish.outputs.ci-run-id }}

