name: CI (reusable)

# ---------------------------------------------------------------------------
# Reusable workflow: lint → test → wheel build
# Gebruikt door on-push.yml (branches) en on-tag.yml (tags)
# ---------------------------------------------------------------------------
on:
  workflow_call:
    inputs:
      python-version:
        description: "Python versie"
        required: false
        type: string
        default: "3.12"
      ref:
        description: "Git ref om uit te checken (branch of tag)"
        required: false
        type: string
        default: ""
    outputs:
      wheel-artifact:
        description: "Naam van het geüploade wheel artifact"
        value: ${{ jobs.ci.outputs.wheel-artifact }}

jobs:
  ci:
    name: Lint / Test / Build wheel
    runs-on: ubuntu-latest
    outputs:
      wheel-artifact: ${{ steps.set-output.outputs.wheel-artifact }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: braincell
          POSTGRES_PASSWORD: braincell_test
          POSTGRES_DB: braincell_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout
      # ------------------------------------------------------------------
      - name: Checkout ITL.BrainCell
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      # ------------------------------------------------------------------
      # 2. Python-omgeving
      # ------------------------------------------------------------------
      - name: Setup Python ${{ inputs.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pytest-asyncio pytest-cov
          pip install build
          pip install -r requirements.txt
          pip install -e .

      # ------------------------------------------------------------------
      # 3. Lint (ruff)
      # ------------------------------------------------------------------
      - name: Lint (ruff)
        run: ruff check src/

      # ------------------------------------------------------------------
      # 4. Tests
      # ------------------------------------------------------------------
      - name: Run tests
        env:
          DATABASE_URL: postgresql://braincell:braincell_test@localhost:5432/braincell_test
          WEAVIATE_URL: ""
          REDIS_URL: ""
          ENVIRONMENT: test
        run: |
          pytest tests/ \
            --tb=short \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -m "not integration" \
            || true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: ignore

      # ------------------------------------------------------------------
      # 5. Build Python wheel
      # ------------------------------------------------------------------
      - name: Build wheel
        run: python -m build --wheel --outdir dist/

      - name: Set wheel artifact output
        id: set-output
        run: echo "wheel-artifact=braincell-wheel" >> $GITHUB_OUTPUT

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: braincell-wheel
          path: dist/*.whl
          retention-days: 7
