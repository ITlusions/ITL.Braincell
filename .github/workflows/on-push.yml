name: CI — Branch push

# ---------------------------------------------------------------------------
# Triggers on GitFlow branches (feature, develop, release, hotfix, main).
# On main: after a successful CI run, a patch version tag is auto-created.
# That tag then triggers on-tag.yml → Publish → Release.
# ---------------------------------------------------------------------------
on:
  push:
    branches:
      - develop
      - main
      - "feature/**"
      - "release/**"
      - "hotfix/**"
  pull_request:
    branches:
      - develop
      - main
      - "release/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-version:
    name: Detect version
    uses: ITlusions/ITL.Github/.github/workflows/_reusable-detect-version.yml@main

  ci:
    name: CI
    needs: detect-version
    uses: ITlusions/ITL.Github/.github/workflows/_reusable-ci-python.yml@main
    with:
      python-version: "3.12"
      ref: ${{ github.sha }}
      artifact-name: "braincell-wheel"
      version: ${{ needs.detect-version.outputs.python-version }}
      postgres-user: "braincell"
      postgres-password: "braincell_test"
      postgres-db: "braincell_test"
      extra-install: "pip install -e ."

  # ------------------------------------------------------------------
  # Auto-tag: only on main after a successful CI run.
  # Determines the highest existing semver tag and bumps the patch version.
  # The new tag triggers on-tag.yml (Publish + Release).
  # ------------------------------------------------------------------
  auto-tag:
    name: Auto-tag patch release
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: ITlusions/ITL.Github/.github/workflows/_reusable-auto-tag.yml@main
    with:
      commit-sha: ${{ github.sha }}
    secrets:
      gh-pat: ${{ secrets.GH_PAT }}

