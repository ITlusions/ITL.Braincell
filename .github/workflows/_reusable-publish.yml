name: Publish (reusable)

# ---------------------------------------------------------------------------
# Reusable workflow: publiceer Python wheel naar GitHub Packages (PyPI-feed)
# De gepubliceerde versie is daarna installeerbaar via pip:
#   pip install itl-braincell --extra-index-url https://...
# ---------------------------------------------------------------------------
on:
  workflow_call:
    inputs:
      version:
        description: "Semver versie (zonder 'v'-prefix), bijv. 1.2.3"
        required: true
        type: string
      ref:
        description: "Git ref om uit te checken (tag)"
        required: true
        type: string
    secrets:
      GH_PAT:
        description: "PAT voor publiceren naar GitHub Packages"
        required: false

jobs:
  publish:
    name: Publish wheel → GitHub Packages
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout
      # ------------------------------------------------------------------
      - name: Checkout ITL.BrainCell
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      # ------------------------------------------------------------------
      # 2. Python-omgeving
      # ------------------------------------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      # ------------------------------------------------------------------
      # 3. Patch versie in pyproject.toml naar de tag-versie
      # ------------------------------------------------------------------
      - name: Patch versie naar ${{ inputs.version }}
        run: |
          sed -i "s/^version = .*/version = \"${{ inputs.version }}\"/" pyproject.toml
          grep version pyproject.toml

      # ------------------------------------------------------------------
      # 4. Build wheel + sdist
      # ------------------------------------------------------------------
      - name: Build distributie
        run: python -m build --outdir dist/

      # ------------------------------------------------------------------
      # 5. Upload naar GitHub Packages (PyPI-compatible feed)
      # ------------------------------------------------------------------
      - name: Publish naar GitHub Packages
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          twine upload \
            --repository-url https://maven.pkg.github.com/ITlusions/ \
            --skip-existing \
            dist/*

      # ------------------------------------------------------------------
      # 6. Upload wheel als workflow artifact (voor de release job)
      # ------------------------------------------------------------------
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: braincell-wheel-${{ inputs.version }}
          path: dist/*.whl
          retention-days: 30

      # ------------------------------------------------------------------
      # 7. Summary
      # ------------------------------------------------------------------
      - name: Write job summary
        run: |
          echo "## Python package gepubliceerd" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Package** | \`itl-braincell==${{ inputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Feed** | GitHub Packages (ITlusions) |" >> $GITHUB_STEP_SUMMARY
          ls dist/ | while read f; do echo "| **Bestand** | \`$f\` |" >> $GITHUB_STEP_SUMMARY; done
