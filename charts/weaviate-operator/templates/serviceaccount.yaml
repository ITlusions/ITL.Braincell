{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{- if .Values.serviceAccount.name }}{{ .Values.serviceAccount.name }}{{- else }}{{ include "weaviate-operator.fullname" . }}{{- end }}
  labels:
    app.kubernetes.io/name: {{ include "weaviate-operator.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end -}}
