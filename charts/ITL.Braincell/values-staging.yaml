# ITL.Braincell Staging Values
# This file contains staging environment configuration

namespace: braincell-staging

cnpg:
  enabled: true
  clusterName: braincell-postgres-staging
  instances: 2  # Lower redundancy for staging
  imageName: "docker.io/library/postgres:14"
  postgresqlVersion: "14"
  postgresUID: 999
  postgresGID: 999
  storage:
    size: 20Gi
    storageClass: "standard"
  backup:
    enabled: true
    schedule: "0 4 * * *"
    retentionPolicy: "7d"  # Shorter retention for staging
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

weaviate:
  image:
    registry: docker.io
    tag: 1.34.0
    repo: semitechnologies/weaviate
    pullPolicy: IfNotPresent

  replicas: 2
  
  resources:
    requests:
      memory: "2Gi"
      cpu: "500m"
    limits:
      memory: "4Gi"
      cpu: "1000m"

  storage:
    name: "weaviate-data"
    size: 50Gi
    storageClassName: "standard"

  service:
    name: weaviate
    ports:
      - name: http
        protocol: TCP
        port: 80
    type: ClusterIP

  authentication:
    anonymous_access:
      enabled: true  # Allow anonymous for staging
    oidc:
      enabled: false

  env:
    PROMETHEUS_MONITORING_ENABLED: true
    GOGC: 100

api:
  enabled: true
  image:
    repository: itlbraincell/api
    tag: "staging"
    pullPolicy: Always  # Always pull latest staging image
  replicaCount: 2
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  env:
    ENVIRONMENT: "staging"
    LOG_LEVEL: "DEBUG"  # More verbose logging for staging

mcp:
  enabled: true
  image:
    repository: itlbraincell/mcp
    tag: "staging"
    pullPolicy: Always
  replicaCount: 1
  port: 9506
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "250m"
  ingress:
    enabled: true
    className: traefik
    path: /mcp
    pathType: Prefix
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-staging"

traefik:
  enabled: true
  deployment:
    replicas: 1
  ingressClass:
    enabled: true
    isDefaultClass: false
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

postgres:
  enabled: false
  database: braincell
  user: braincell
  passwordSecretName: braincell-postgres-secret-staging
  passwordSecretKey: password
  port: 5432

monitoring:
  enabled: true
  prometheus:
    enabled: true

backup:
  enabled: false  # Disable backups for staging

networkPolicy:
  enabled: false  # Simplified networking for staging

labels:
  app: braincell
  environment: staging
  managed-by: helm
