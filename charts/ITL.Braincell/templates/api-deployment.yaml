{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: braincell-api
  namespace: {{ .Release.Namespace | default .Values.namespace }}
  labels:
    app: braincell-api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      app: braincell-api
  template:
    metadata:
      labels:
        app: braincell-api
    spec:
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          ports:
            - containerPort: 8080

---

apiVersion: v1
kind: Service
metadata:
  name: braincell-api
  namespace: {{ .Release.Namespace | default .Values.namespace }}
spec:
  type: ClusterIP
  selector:
    app: braincell-api
  ports:
    - port: 8080
      targetPort: 8080

{{- end }}
