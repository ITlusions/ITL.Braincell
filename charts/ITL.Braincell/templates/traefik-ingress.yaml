---
# BrainCell API Ingress via Traefik
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: braincell-api
  namespace: {{ .Release.Namespace | default .Values.namespace }}
  labels:
    app: braincell-api
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: "web"
spec:
  ingressClassName: traefik
  rules:
  - http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: braincell-api
            port:
              number: 8080

---
# Weaviate Ingress via Traefik
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: weaviate
  namespace: {{ .Release.Namespace | default .Values.namespace }}
  labels:
    app: weaviate
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: "web"
spec:
  ingressClassName: traefik
  rules:
  - http:
      paths:
      - path: /weaviate
        pathType: Prefix
        backend:
          service:
            name: weaviate
            port:
              number: 80

